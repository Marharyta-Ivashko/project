<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASCO - Fashion Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/main.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Orbitron&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <header data-include="components/header_shop.html"></header>
  <section>
    <div class="container my-5">
      <div class="text-center mb-5">
        <h3 class="text-black display-5 mb-3">Men's Fashion</h3>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb justify-content-center">
            <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Men's Fashion</li>
          </ol>
        </nav>
      </div>

      <div class="row">
        <div class="col-lg-3 pe-lg-4 d-none d-lg-block">

          <h5 class="fw-semibold mb-4 text-muted">Filters</h5>

          <div class="mb-4">
            <h6 class="fw-semibold mb-3 text-muted">Size</h6>
            <div class="btn-group-sm" role="group" aria-label="Size filters">
              <button class="filter-size-btn" data-filter="all">All</button>
              <button class="filter-size-btn" data-filter="s">S</button>
              <button class="filter-size-btn active" data-filter="m">M</button>
              <button class="filter-size-btn" data-filter="l">L</button>
              <button class="filter-size-btn" data-filter="xl">XL</button>
            </div>
          </div>

          <div class="mb-4">
            <h6 class="fw-semibold mb-3 text-muted">Colors</h6>
            <div class="d-flex flex-wrap gap-2">
              <button class="color-swatch border-0 text-center selected" data-color="all"
                style="background-color: #f8f9fa; line-height: 15px;">All</button>
              <button class="color-swatch border-0" data-color="red" style="background-color: #ff5252;"
                aria-label="Red"></button>
              <button class="color-swatch border-0" data-color="orange" style="background-color: #ffb142;"
                aria-label="Orange"></button>
              <button class="color-swatch border-0" data-color="yellow" style="background-color: #ffd32a;"
                aria-label="Yellow"></button>
              <button class="color-swatch border-0" data-color="green" style="background-color: #33d9b2;"
                aria-label="Green"></button>
              <button class="color-swatch border-0" data-color="blue" style="background-color: #34ace0;"
                aria-label="Blue"></button>
              <button class="color-swatch border-0" data-color="purple" style="background-color: #706fd3;"
                aria-label="Purple"></button>
            </div>
          </div>

          <div class="mb-4">
            <h6 class="fw-semibold mb-3 text-muted">Prices</h6>
            <div class="list-group list-group-flush border-0">
              <a href="#" class="filter-link">$0 - $50</a>
              <a href="#" class="filter-link">$50 - $100</a>
              <a href="#" class="filter-link">$100 - $150</a>
              <a href="#" class="filter-link">$150 - $200</a>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="dropdown">
              <button class="btn btn-link text-dark text-decoration-none dropdown-toggle p-0" type="button"
                data-bs-toggle="dropdown">
                Best selling
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Price: Low to High</a></li>
                <li><a class="dropdown-item" href="#">Price: High to Low</a></li>
                <li><a class="dropdown-item" href="#">Newest</a></li>
              </ul>
            </div>

            <div class="btn-group">
              <button class="btn btn-light btn-sm border" aria-label="Grid view"><i
                  class="bi bi-grid-3x3-gap-fill"></i></button>
              <button class="btn btn-light btn-sm border" aria-label="List view"><i class="bi bi-list"></i></button>
            </div>
          </div>
          <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="mens-products-grid">
            <h5 class="text-center text-muted">No products found</h5>
          </div>
        </div>
      </div>
    </div>

  </section>
  <footer data-include="components/footer.html"></footer>
  <!-- Modal -->
  <div data-include="components/sign_in_modal.html"></div>
  <div data-include="components/sign_up_modal.html"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
