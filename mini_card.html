<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASCO - Rounded Red Hat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/main.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Orbitron&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <header data-include="components/header_shop.html"></header>

  <main class="container my-5 py-3">
    <div class="row gx-lg-5">
      <div class="col-lg-7 d-flex gx-4 gap-3 mb-5 mb-lg-0">
        <div class="d-flex flex-column gap-3 mini-card-thumbnails" style="width: 85px;">
          <img src="images/card_shop/rounded_red_hat.png" class="img-fluid border active" alt="rounded red hat">
          <img src="images/card_shop/long-sleeve_coat.png" class="img-fluid border border-transparent"
            alt="long sleeve coat">
          <img src="images/card_shop/rockstar_jacket.png" class="img-fluid border border-transparent"
            alt="rockstar jacket">
          <img src="images/card_shop/oversized_t-shirt.png" class="img-fluid border border-transparent"
            alt="oversized t-shirt">
        </div>
        <!-- Main Image -->
        <div class="flex-grow-1 bg-light d-flex align-items-center justify-content-center"
          style="width: 491px; height: 654px;">
          <img src="images/card_shop/rounded_red_hat.png" class="w-100 h-100 object-fit-cover" alt="Rounded Red Hat">
        </div>
      </div>

      <!-- Right side: Product info -->
      <div class="col-lg-5 d-flex flex-column pt-2">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <h2 class="display-6 mb-0 fw-normal">Rounded Red Hat</h2>
        </div>
        <div class="product-rating d-flex text-warning"></div>
        <span class="fs-6 text-muted">(1.1k) Customer Reviews</span>
        <!-- Price -->
        <div class="d-flex align-items-center gap-3 mb-3 mt-2">
          <span class="fs-3 fw-semibold text-dark">$39.00</span>
          <span class="text-decoration-line-through fs-5 fw-semibold text-muted">$59.00</span>
          <span class="badge rounded-pill fw-normal ms-1 px-3 py-1"
            style="background-color: #ff5252; font-size: 0.8rem;">SAVE 33%</span>
        </div>
        <!-- Views -->
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-eye text-dark me-2"></i>
          <span class="text-muted small"><span class="fw-bold text-dark">4</span> people are viewing this right
            now</span>
        </div>
        <!-- Stock -->
        <div class="mb-3 mt-1">
          <p class="small text-muted mb-2">Only <span class="fw-bold text-dark">9</span> item(s) left in stock!</p>
          <div class="progress" style="height: 4px; background-color: #e9ecef;">
            <div class="progress-bar rounded-pill" role="progressbar" style="width: 15%; background-color: #ff5252;"
              aria-valuenow="15" aria-valuemin="0" aria-valuemax="100"></div>
          </div>
        </div>
        <!-- Size Selection -->
        <div class="mb-3 pt-1 d-flex gap-2 align-items-center">
          <span class="fw-semibold text-dark mb-1">Size:</span>
          <button class="size-btn active">M</button>
          <button class="size-btn">L</button>
        </div>
        <!-- Color Selection -->
        <div class="mb-3 pt-1 d-flex gap-2 align-items-center">
          <span class="fw-semibold text-dark mb-1">Color:</span>
          <div class="d-flex gap-3 align-items-center">
            <span class="color-swatch-ring active">
              <span class="color-dot border" style="background-color: red;"></span>
            </span>
          </div>
        </div>
        <!-- Add to Cart / Quantity -->
        <div class="mb-3">
          <p class="fw-semibold text-dark mb-3">Quantity</p>
          <div class="d-flex gap-4">
            <div class="quantity-control d-flex">
              <button id="qty-minus">-</button>
              <input type="text" id="qty-input" value="1">
              <button id="qty-plus">+</button>
            </div>
            <button class="btn btn-outline-dark add-to-cart-btn flex-grow-1" type="button" data-bs-toggle="offcanvas"
              data-bs-target="#offcanvascard" aria-controls="offcanvascard">Add to cart</button>
          </div>
        </div>

        <!-- Meta Buttons -->
        <div class="d-flex gap-4 mb-1 mt-2 pt-3 border-top w-100 justify-content-between">
          <a href="#" class="text-decoration-none text-dark small hover-opacity transition">
            <i class="bi bi-arrow-left-right me-1 fs-6 align-middle"></i> Compare
          </a>
          <a href="#" class="text-decoration-none text-dark small hover-opacity transition">
            <i class="bi bi-question-circle me-1 fs-6 align-middle"></i> Ask a question
          </a>
          <a href="#" class="text-decoration-none text-dark small hover-opacity transition">
            <i class="bi bi-share me-1 fs-6 align-middle"></i> Share
          </a>
        </div>

        <hr class="mb-3 text-muted">

        <!-- Shipping details -->
        <div class="d-flex flex-column gap-3 small mt-1 text-dark">
          <div class="d-flex align-items-center gap-3">
            <i class="bi bi-truck fs-4"></i>
            <span><strong class="fw-bold">Estimated Delivery:</strong> Jul 30 - Aug 03</span>
          </div>
          <div class="d-flex align-items-center gap-3">
            <i class="bi bi-box-seam fs-4"></i>
            <span><strong class="fw-bold">Free Shipping & Returns:</strong> On all orders over $75</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <section class="product-section container-fluid mt-5" data-include="components/peaky_blinders.html"></section>
  <section id="deals" class="deals bg-body-tertiary" data-include="components/deals.html"></section>
  <section class="container my-5" data-include="components/subscription.html"></section>
  <footer class="border-top pt-5 pb-4 mt-5" data-include="components/footer.html"></footer>

  <!-- Shopping Cart Offcanvas -->
  <div data-include="components/offcanvas_basket.html"></div>
  <div data-include="components/sign_in_modal.html"></div>
  <div data-include="components/sign_up_modal.html"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
