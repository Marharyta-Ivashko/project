<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASCO - Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/main.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Orbitron&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <header data-include="components/header_shop.html"></header>

  <section>
    <div class="container my-5">
      <!-- Page title + breadcrumb -->
      <div class="text-center mb-5">
        <h3 class="mb-3">Shopping Cart</h3>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb justify-content-center">
            <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Your Shopping Cart</li>
          </ol>
        </nav>
      </div>

      <!-- Cart Table -->
      <div class="table-responsive">
        <table class="table align-middle" id="cart-table">
          <thead>
            <tr class="border-bottom">
              <th class="fw-normal text-muted pb-3" style="font-size: 0.95rem; width: 40%;">Product</th>
              <th class="fw-normal text-muted pb-3" style="font-size: 0.95rem;">Price</th>
              <th class="fw-normal text-muted pb-3" style="font-size: 0.95rem;">Quantity</th>
              <th class="fw-normal text-muted pb-3 text-end" style="font-size: 0.95rem;">Total</th>
            </tr>
          </thead>
          <tbody id="cart-items">
            <!-- Cart Row -->
            <tr class="border-bottom">
              <td class="py-4">
                <div class="d-flex align-items-start gap-3">
                  <div style="width: 100px; height: 120px; flex-shrink: 0;">
                    <img src="images/card_shop/rounded_red_hat.png" alt="Rounded Red Hat"
                      class="img-fluid w-100 h-100 object-fit-cover">
                  </div>
                  <div class="pt-1">
                    <h6 class="fw-bold mb-1 lh-sm" style="font-size: 1rem;">Rounded Red Hat</h6>
                    <p class="text-muted small mb-2">Color : Red</p>
                    <a href="#" class="text-muted small" style="text-decoration: underline;">Remove</a>
                  </div>
                </div>
              </td>
              <td class="py-4">
                <span class="fw-semibold">$39.00</span>
              </td>
              <td class="py-4">
                <div class="d-inline-flex align-items-center border" style="width: fit-content;">
                  <button class="btn btn-sm px-3 shadow-none border-0 fw-bold fs-5 text-dark cart-qty-minus">-</button>
                  <span class="px-3 fw-medium text-muted cart-qty-display">01</span>
                  <button class="btn btn-sm px-3 shadow-none border-0 fw-bold fs-5 text-dark cart-qty-plus">+</button>
                </div>
              </td>
              <td class="py-4 text-end">
                <span class="fw-bold cart-row-total">$39.00</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Summary Block -->
      <div class="d-flex justify-content-end mt-4">
        <div style="width: 100%; max-width: 420px;">

          <!-- Wrap Option -->
          <div class="form-check d-flex align-items-center py-3 border-top border-bottom mb-0">
            <input class="form-check-input me-3 rounded-0 shadow-none border-dark border-2" type="checkbox"
              id="wrapProductCart" style="width: 20px; height: 20px; cursor: pointer;">
            <label class="form-check-label text-muted" for="wrapProductCart" style="cursor: pointer;">
              For <strong class="text-dark">$10.00</strong> Please Wrap The Product
            </label>
          </div>

          <!-- Subtotal -->
          <div class="d-flex justify-content-between align-items-center py-4 border-bottom">
            <span class="fw-bold fs-5">Subtotal</span>
            <span class="fw-bold fs-5" id="cart-subtotal">$100.00</span>
          </div>

          <!-- Checkout Button -->
          <button type="button" class="btn btn-dark w-100 py-3 mt-4 fw-normal" style="font-size: 1.05rem;">
            Checkout
          </button>

          <!-- View Cart Link -->
          <a href="#" class="d-block text-center mt-3 text-dark fw-bold" style="text-decoration: underline;">
            View Cart
          </a>

        </div>
      </div>
    </div>
  </section>

  <footer data-include="components/footer.html"></footer>
  <div data-include="components/sign_in_modal.html"></div>
  <div data-include="components/sign_up_modal.html"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
