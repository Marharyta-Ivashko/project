<div class="modal fade" id="registerModal2" aria-hidden="true" aria-labelledby="registerModalLabel2" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content p-3">
      <div class="modal-header border-0 pb-0">
        <h2 class="modal-title fw-bold" id="registerModalLabel2">Register</h2>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-md-6 d-none d-md-block">
            <img src="images/registration/registr.png" class="img-fluid" alt="register">
          </div>
          <div class="col-md-6 d-flex align-items-center justify-content-center bg-white p-4">
            <div class="w-100" style="max-width: 420px;">
              <h2>FASCO</h2>
              <h2 class="fw-bold mb-4 text-center">Create Account</h2>
              <button
                class="btn btn-outline-dark w-100 mb-3 py-2 fw-semibold d-flex align-items-center justify-content-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                  <path
                    d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z" />
                </svg>
                Sign up with Google
              </button>
              <div class="divider-text text-uppercase fw-semibold">OR</div>
              <form>
                <div class="mb-3">
                  <input type="text" class="form-control py-2" id="firstName" placeholder="First Name" required
                    aria-label="First Name">
                </div>
                <div class="mb-3">
                  <input type="text" class="form-control py-2" id="lastName" placeholder="Last Name" required
                    aria-label="Last Name">
                </div>
                <div class="mb-3">
                  <input type="email" class="form-control py-2" id="emailRegister" placeholder="Email Address" required
                    aria-label="Email Address">
                </div>
                <div class="mb-3">
                  <input type="tel" class="form-control py-2" id="phone" placeholder="Phone Number" required
                    aria-label="Phone Number">
                </div>
                <div class="mb-3">
                  <input type="password" class="form-control py-2" id="passwordRegister" placeholder="Password" required
                    aria-label="Password">
                </div>
                <div class="mb-4">
                  <input type="password" class="form-control py-2" id="confirmPassword" placeholder="Confirm Password"
                    required aria-label="Confirm Password">
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2 mb-3 fw-bold fs-5">
                  Create Account
                </button>
                <button type="button" class="btn btn-outline-secondary w-100 py-2 fw-semibold"
                  data-bs-target="#registerModal" data-bs-toggle="modal">
                  Already have an account? Login
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-dark" data-bs-target="#registerModal" data-bs-toggle="modal">Back to
          Login</button>
      </div>
    </div>
  </div>
</div>
