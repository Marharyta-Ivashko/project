<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvascard" aria-labelledby="offcanvascardLabel"
  style="width: 450px;">
  <div class="offcanvas-header pb-0 border-0 mt-2 px-4">
    <h3 class="offcanvas-title volkhov-font fw-normal" id="offcanvascardLabel" style="font-size: 2rem;">Shopping Cart
    </h3>
    <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column pt-3 px-4">

    <!-- Free Shipping Notice -->
    <div class="text-muted mb-4 fs-6">
      Buy <strong class="text-dark">$122.35</strong> More And Get <strong class="text-dark">Free Shipping</strong>
    </div>

    <!-- Product Item -->
    <div class="d-flex gap-4 mb-4">
      <!-- Product Image -->
      <div class="bg-light border-0 d-flex align-items-center justify-content-center"
        style="width: 110px; height: 140px;">
        <img src="../images/card_shop/rounded_red_hat.png" alt="Rounded Red Hat"
          class="img-fluid w-100 h-100 object-fit-cover">
      </div>
      <!-- Product Details -->
      <div class="d-flex flex-column justify-content-start flex-grow-1 pt-1">
        <h6 class="fw-bold mb-1 fs-6">Rounded Red Hat</h6>
        <p class="text-muted small mb-2">Color : Red</p>
        <p class="fw-semibold mb-3">$39.00</p>

        <!-- Quantity Control -->
        <div class="d-inline-flex bg-light align-items-center border-0" style="width: fit-content;">
          <button class="btn btn-sm text-dark px-2 shadow-none border-0 fw-bold fs-5">-</button>
          <span class="px-3 fw-medium text-muted">01</span>
          <button class="btn btn-sm text-dark px-2 shadow-none border-0 fw-bold fs-5">+</button>
        </div>
      </div>
    </div>

    <hr class="text-muted opacity-25 mb-4">

    <!-- Bottom Section (sticks to bottom) -->
    <div class="mt-auto">

      <!-- Wrapping Option -->
      <div class="form-check mb-4">
        <input class="form-check-input me-3 rounded-0 shadow-none border-dark border-2 cursor-pointer" type="checkbox"
          id="wrapProduct" style="width: 20px; height: 20px; cursor: pointer;">
        <label class="form-check-label text-muted" for="wrapProduct" style="font-size: 0.95rem;">
          For <strong class="text-dark">$10.00</strong> Please Wrap The Product
        </label>
      </div>

      <hr class="text-muted opacity-25 mb-4">

      <!-- Subtotal -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="fw-semibold fs-5">Subtotal</span>
        <span class="fw-bold fs-5">$39.00</span>
      </div>

      <a href="/shopping_cart.html"
        class="btn btn-dark w-100 py-2 mb-2 rounded fw-normal hero-shop-btn shadow-sm d-inline-flex align-items-center justify-content-center">Checkout</a>
      <a href="/shop_page.html"
        class="text-dark fw-bold text-decoration-underline d-block text-center mb-2 py-2">Continue
        shopping</a>
    </div>

  </div>
</div>
